<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crosshair Overlay</title>
    <style>
        /* Toàn màn hình trong suốt */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent !important; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* THIẾT KẾ TÂM ẢO CỦA BẠN Ở ĐÂY */
        .crosshair {
            width: 10px;
            height: 10px;
            background-color: #ff0000; /* Màu tâm (Đỏ) */
            border-radius: 50%; /* Tâm hình tròn */
            box-shadow: 0 0 8px #ff0000; /* Tạo hiệu ứng phát sáng */
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="crosshair"></div>

</body>
</html>
